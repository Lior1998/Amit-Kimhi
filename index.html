        .card-container {

            background: #2563eb;

            padding: 14px;

            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
            transition: background 0.3s;

            cursor: pointer;

        .btn-whatsapp {
